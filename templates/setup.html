<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geo Trivia — Setup</title>
    <style>
        body {
            background-color: #f6f5ef;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            padding: 60px 20px;
            color: #333;
            margin: 0;
        }

        .setup-card {
            background-color: #fff;
            border: 3px solid #000;
            border-radius: 16px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 4px 0 rgba(0,0,0,0.05);
        }

        h1 {
            margin: 0 0 8px;
            font-size: 2rem;
        }

        .subtitle {
            color: #888;
            font-size: 0.95rem;
            margin-bottom: 32px;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.9rem;
            margin-bottom: 24px;
        }

        .status-badge.ready {
            background-color: #d4edda;
            color: #28a745;
            border: 2px solid #28a745;
        }

        .status-badge.missing {
            background-color: #f8d7da;
            color: #dc3545;
            border: 2px solid #dc3545;
        }

        .btn {
            display: inline-block;
            padding: 14px 28px;
            font-size: 1.05rem;
            font-weight: 700;
            border: 3px solid #000;
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            transition: background-color 0.2s;
        }

        .btn-play {
            background-color: #8fd165;
            color: #000;
            margin-right: 12px;
        }

        .btn-play:hover { background-color: #7bc550; }

        .btn-scrape {
            background-color: #fff;
            color: #000;
        }

        .btn-scrape:hover { background-color: #e8e8e8; }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Progress section — hidden until scraping starts */
        #progress-section {
            display: none;
            margin-top: 32px;
        }

        #progress-section h2 {
            font-size: 1.1rem;
            margin: 0 0 16px;
        }

        /* Overall progress bar */
        .progress-bar-track {
            background-color: #f0f0f0;
            border: 2px solid #000;
            border-radius: 8px;
            height: 22px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .progress-bar-fill {
            height: 100%;
            background-color: #8fd165;
            border-radius: 6px;
            width: 0%;
            transition: width 0.4s ease;
        }

        /* Step list */
        .step-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .step-list li {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
            font-size: 0.95rem;
            font-weight: 600;
            color: #888;
        }

        .step-list li:last-child { border-bottom: none; }

        .step-list li.running { color: #000; }
        .step-list li.done    { color: #28a745; }
        .step-list li.failed  { color: #dc3545; }

        .step-icon {
            font-size: 1.1rem;
            width: 1.4em;
            text-align: center;
        }

        #result-message {
            display: none;
            margin-top: 24px;
            font-weight: 700;
            font-size: 1.05rem;
        }

        #result-message.success { color: #28a745; }
        #result-message.failure { color: #dc3545; }

        #play-after-scrape {
            display: none;
            margin-top: 16px;
        }
    </style>
</head>
<body>

<div class="setup-card">
    <h1>🌍 Geo Trivia</h1>
    <p class="subtitle">Before you can play, the game needs country data scraped from Wikipedia.</p>

    {% if has_data %}
        <span class="status-badge ready">✓ Data ready</span>
    {% else %}
        <span class="status-badge missing">✗ Data not found</span>
    {% endif %}

    <div>
        {% if has_data %}
            <a href="{{ url_for('game') }}" class="btn btn-play">▶ Play now</a>
        {% endif %}
        <button id="scrape-btn" class="btn btn-scrape" onclick="startScraping()">
            {% if has_data %}↻ Re-scrape data{% else %}⬇ Scrape data now{% endif %}
        </button>
    </div>

    <div id="progress-section">
        <h2>Scraping progress</h2>

        <div class="progress-bar-track">
            <div id="progress-bar-fill" class="progress-bar-fill"></div>
        </div>

        <ul class="step-list" id="step-list">
            {% for label, _ in steps %}
                <li id="step-{{ loop.index0 }}">
                    <span class="step-icon">○</span>
                    <span>{{ label }}</span>
                </li>
            {% endfor %}
        </ul>

        <div id="result-message"></div>

        <a id="play-after-scrape" href="{{ url_for('game') }}" class="btn btn-play">
            ▶ Play now
        </a>
    </div>
</div>

<script>
    function startScraping() {
        const btn = document.getElementById('scrape-btn');
        btn.disabled = true;
        btn.textContent = 'Scraping…';

        document.getElementById('progress-section').style.display = 'block';
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });

        const source = new EventSource('/setup/run');

        source.onmessage = function (event) {
            const data = JSON.parse(event.data);

            if (data.finished) {
                source.close();
                const msg = document.getElementById('result-message');
                msg.style.display = 'block';
                if (data.success) {
                    msg.className = 'success';
                    msg.textContent = '✓ All steps completed. Data is ready!';
                    document.getElementById('play-after-scrape').style.display = 'inline-block';
                } else {
                    msg.className = 'failure';
                    msg.textContent = `✗ Scraping failed at: "${data.failed_step}". Check the terminal for details.`;
                }
                btn.disabled = false;
                btn.textContent = '↻ Re-scrape data';
                return;
            }

            const li = document.getElementById('step-' + data.step);
            const prevLi = data.step > 0 ? document.getElementById('step-' + (data.step - 1)) : null;

            if (data.running) {
                // Mark this step as running
                if (li) {
                    li.className = 'running';
                    li.querySelector('.step-icon').textContent = '⏳';
                }
            } else {
                // Step finished — mark previous step done/failed and update bar
                const doneLi = prevLi || li; // step index after increment points to next step
                const finishedLi = document.getElementById('step-' + (data.step - 1));
                if (finishedLi) {
                    if (data.success) {
                        finishedLi.className = 'done';
                        finishedLi.querySelector('.step-icon').textContent = '✓';
                    } else {
                        finishedLi.className = 'failed';
                        finishedLi.querySelector('.step-icon').textContent = '✗';
                    }
                }
                // Update overall progress bar
                const pct = (data.step / data.total) * 100;
                document.getElementById('progress-bar-fill').style.width = pct + '%';
            }
        };

        source.onerror = function () {
            source.close();
            const msg = document.getElementById('result-message');
            msg.style.display = 'block';
            msg.className = 'failure';
            msg.textContent = '✗ Connection lost. Check the terminal for details.';
            btn.disabled = false;
            btn.textContent = '↻ Re-scrape data';
        };
    }
</script>

</body>
</html>
